# docker-compose.yml — ETABS LLM Automation
# NOTE: The ETABS Python service runs natively on the Windows host (not here).
#       It needs win32com which only works on Windows with ETABS installed.

services:
  # ── Node.js Backend (Express API) ───────────────────────────
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - ETABS_SERVICE_URL=http://host.docker.internal:5000  # ETABS on Windows host
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── React Frontend (Vite dev server) ────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - backend
